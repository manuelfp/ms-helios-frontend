apiVersion: v1
kind: Service
metadata:
  name: ms-helios-frontend-svc
  namespace: helios
  annotations:
    networking.gke.io/load-balancer-type: "Internal"
spec:
  selector:
    app: ms-helios-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: LoadBalancer
  loadBalancerIP: "10.10.10.3"